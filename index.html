<!DOCTYPE html>
<!-- v10 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gorillas — Contact Heatmap</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #F5F0E8;
    color: #1A1A1A;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    font-size: 13px;
    overflow-x: auto;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid #D8D0C4;
    flex-wrap: wrap;
    gap: 8px;
  }

  .title { font-size: 15px; font-weight: 600; }

  .legend {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 11px;
    color: #888;
  }

  .legend-item { display: flex; align-items: center; gap: 4px; }

  .dot {
    width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0;
  }

  .sort-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 20px;
    border-bottom: 1px solid #D8D0C4;
    flex-wrap: wrap;
  }

  .sort-btn {
    background: none;
    border: 1px solid #D8D0C4;
    border-radius: 4px;
    color: #888;
    font-size: 11px;
    padding: 3px 8px;
    cursor: pointer;
  }

  .sort-btn.active, .sort-btn:hover {
    border-color: #888;
    color: #1A1A1A;
  }

  input[type="search"] {
    background: #EDE8DF;
    border: 1px solid #D8D0C4;
    border-radius: 6px;
    color: #1A1A1A;
    font-size: 12px;
    padding: 5px 10px;
    width: 180px;
    outline: none;
  }

  /* The whole grid is one table-like structure */
  .heatmap-wrap {
    padding: 10px 20px 40px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .heatmap-table {
    border-collapse: collapse;
    white-space: nowrap;
  }

  /* Month header row */
  .month-row td {
    font-size: 10px;
    color: #888;
    padding-bottom: 4px;
    vertical-align: bottom;
    font-weight: 500;
  }

  .name-cell {
    font-size: 12px;
    color: #1A1A1A;
    padding-right: 12px;
    text-align: left;
    vertical-align: middle;
    white-space: nowrap;
  }

  .name-cell a {
    color: #1A1A1A;
    text-decoration: none;
  }

  .name-cell a:hover { color: #000; text-decoration: underline; }

  .count-cell {
    font-size: 10px;
    color: #888;
    padding-left: 8px;
    vertical-align: middle;
  }

  /* Each week cell */
  .week-cell {
    width: 12px;
    height: 12px;
    padding: 1px;
    vertical-align: middle;
  }

  .week-cell div {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    background: #E0D8CC;
  }

  .week-cell div.meeting { background: #4a9eff; }
  .week-cell div.call    { background: #FF0066; }
  .week-cell div.whatsapp{ background: #3ecf6a; }
  .week-cell div.email   { background: #999; }

  .status {
    text-align: center;
    padding: 60px 20px;
    color: #888;
  }

  .status.error { color: #e05555; }
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
    <span class="title">🦍 Gorillas — Contact Heatmap</span>
    <input type="search" id="search" placeholder="Filter by name…" autocomplete="off">
  </div>
  <div class="legend">
    <div class="legend-item"><div class="dot" style="background:#4a9eff"></div>Meeting</div>
    <div class="legend-item"><div class="dot" style="background:#FF0066"></div>Call</div>
    <div class="legend-item"><div class="dot" style="background:#3ecf6a"></div>WhatsApp</div>
    <div class="legend-item"><div class="dot" style="background:#999"></div>Email</div>
  </div>
</header>

<div class="sort-bar">
  <span style="font-size:11px;color:#888;">Sort:</span>
  <button class="sort-btn active" data-sort="name">A → Z</button>
  <button class="sort-btn" data-sort="count-asc">Least contact ↑</button>
  <button class="sort-btn" data-sort="count-desc">Most contact ↓</button>
  <button class="sort-btn" data-sort="recent">Most recent</button>
</div>

<div class="heatmap-wrap">
  <div id="status" class="status">Loading…</div>
  <table class="heatmap-table" id="heatmapTable" style="display:none;">
    <thead>
      <tr class="month-row" id="monthRow">
        <td></td><!-- name spacer -->
      </tr>
    </thead>
    <tbody id="heatmapBody"></tbody>
  </table>
</div>

<script>
const TYPE_PRIORITY = ['Meeting','Call','WhatsApp','Email'];
let allContacts = [];
let nWeeks = 53;
let monthLabels = [];
let sortMode = 'name';

function typeClass(t) {
  if (!t) return '';
  return t.toLowerCase();
}

function buildTable(contacts) {
  const table = document.getElementById('heatmapTable');
  const body = document.getElementById('heatmapBody');
  const monthRow = document.getElementById('monthRow');

  // Clear
  body.innerHTML = '';
  // Rebuild month header (keep first td spacer)
  monthRow.innerHTML = '<td></td>';
  monthLabels.forEach(label => {
    const td = document.createElement('td');
    td.textContent = label;
    td.colSpan = 1;
    monthRow.appendChild(td);
  });
  // Add count spacer
  monthRow.appendChild(document.createElement('td'));

  if (contacts.length === 0) {
    document.getElementById('status').textContent = 'No contacts found.';
    table.style.display = 'none';
    return;
  }

  contacts.forEach(contact => {
    // Build weekIndex → best type map
    const weekMap = {};
    const weekDate = {};
    contact.interactions.forEach(i => {
      const w = i.weekIndex;
      if (weekMap[w] === undefined) {
        weekMap[w] = i.type;
        weekDate[w] = i.date;
      } else {
        const ex = TYPE_PRIORITY.indexOf(weekMap[w]);
        const inc = TYPE_PRIORITY.indexOf(i.type);
        if (inc < ex) { weekMap[w] = i.type; weekDate[w] = i.date; }
      }
    });

    const tr = document.createElement('tr');

    // Name cell
    const nameTd = document.createElement('td');
    nameTd.className = 'name-cell';
    const a = document.createElement('a');
    a.textContent = contact.name;
    a.title = contact.name;
    if (contact.url) { a.href = contact.url; a.target = '_blank'; a.rel = 'noopener'; }
    nameTd.appendChild(a);
    tr.appendChild(nameTd);

    // Week cells
    for (let w = 0; w < nWeeks; w++) {
      const td = document.createElement('td');
      td.className = 'week-cell';
      const div = document.createElement('div');
      const t = weekMap[w];
      if (t) {
        div.className = typeClass(t);
        div.title = (weekDate[w] || '') + ' · ' + t;
      }
      td.appendChild(div);
      tr.appendChild(td);
    }

    // Count cell
    const countTd = document.createElement('td');
    countTd.className = 'count-cell';
    countTd.textContent = contact.interactions.length;
    tr.appendChild(countTd);

    body.appendChild(tr);
  });

  table.style.display = '';
  document.getElementById('status').style.display = 'none';
}

function sortContacts(contacts, mode) {
  const c = [...contacts];
  if (mode === 'name') c.sort((a,b) => a.name.localeCompare(b.name));
  else if (mode === 'count-asc') c.sort((a,b) => a.interactions.length - b.interactions.length);
  else if (mode === 'count-desc') c.sort((a,b) => b.interactions.length - a.interactions.length);
  else if (mode === 'recent') c.sort((a,b) => {
    const aM = a.interactions.reduce((m,i) => i.date > m ? i.date : m, '');
    const bM = b.interactions.reduce((m,i) => i.date > m ? i.date : m, '');
    return bM.localeCompare(aM);
  });
  return c;
}

function filterAndRender() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let contacts = sortContacts(allContacts, sortMode);
  if (q) contacts = contacts.filter(c => c.name.toLowerCase().includes(q));
  buildTable(contacts);
}

document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    sortMode = btn.dataset.sort;
    filterAndRender();
  });
});

document.getElementById('search').addEventListener('input', filterAndRender);

async function load() {
  const status = document.getElementById('status');
  try {
    const res = await fetch('/.netlify/functions/notion');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    allContacts = data.contacts || [];
    nWeeks = data.nWeeks || 53;
    monthLabels = data.monthLabels || [];
    if (allContacts.length === 0) {
      status.textContent = 'No interactions logged yet.';
      return;
    }
    filterAndRender();
  } catch (err) {
    status.className = 'status error';
    status.textContent = 'Error: ' + err.message;
  }
}

load();
</script>
</body>
</html>
