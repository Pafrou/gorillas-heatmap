<!DOCTYPE html>
<!-- v12 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gorillas — Contact Heatmap</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #F5F0E8;
    color: #1A1A1A;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    font-size: 13px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid #D8D0C4;
    flex-wrap: wrap;
    gap: 8px;
  }

  .title { font-size: 15px; font-weight: 600; }

  .legend {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 11px;
    color: #888;
  }

  .legend-item { display: flex; align-items: center; gap: 4px; }
  .dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

  .btn-new {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    background: #1A1A1A;
    color: #F5F0E8;
    font-size: 12px;
    font-weight: 600;
    border-radius: 6px;
    text-decoration: none;
    white-space: nowrap;
    transition: opacity 0.15s;
  }
  .btn-new:hover { opacity: 0.75; }

  .sort-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 20px;
    border-bottom: 1px solid #D8D0C4;
    flex-wrap: wrap;
  }

  .sort-btn {
    background: none;
    border: 1px solid #D8D0C4;
    border-radius: 4px;
    color: #888;
    font-size: 11px;
    padding: 3px 8px;
    cursor: pointer;
  }

  .sort-btn.active, .sort-btn:hover { border-color: #888; color: #1A1A1A; }

  input[type="search"] {
    background: #EDE8DF;
    border: 1px solid #D8D0C4;
    border-radius: 6px;
    color: #1A1A1A;
    font-size: 12px;
    padding: 5px 10px;
    width: 180px;
    outline: none;
  }

  .heatmap-wrap {
    padding: 10px 20px 40px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  table {
    border-collapse: collapse;
    white-space: nowrap;
  }

  /* Month header */
  .month-label-cell {
    font-size: 10px;
    color: #888;
    font-weight: 500;
    padding-bottom: 4px;
    text-align: left;
    vertical-align: bottom;
  }

  .name-cell {
    font-size: 12px;
    padding-right: 14px;
    vertical-align: middle;
    white-space: nowrap;
  }

  .name-cell a { color: #1A1A1A; text-decoration: none; }
  .name-cell a:hover { text-decoration: underline; }

  .count-cell {
    font-size: 10px;
    color: #888;
    padding-left: 8px;
    vertical-align: middle;
  }

  /* Week cells */
  td.wk {
    padding: 1px;
    vertical-align: middle;
  }

  td.wk div {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    background: #E0D8CC;
    cursor: default;
    position: relative;
  }

  td.wk div.meeting  { background: #4a9eff; }
  td.wk div.call     { background: #FF0066; }
  td.wk div.whatsapp { background: #3ecf6a; }
  td.wk div.email    { background: #999; }

  /* Tooltip */
  td.wk div[data-tip]:hover::after {
    content: attr(data-tip);
    position: fixed;
    background: #333;
    color: #fff;
    font-size: 10px;
    white-space: nowrap;
    padding: 3px 7px;
    border-radius: 4px;
    pointer-events: none;
    z-index: 1000;
    margin-top: -28px;
    margin-left: -20px;
  }

  .status {
    text-align: center;
    padding: 60px 20px;
    color: #888;
  }
  .status.error { color: #e05555; }
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
    <span class="title">🦍 Gorillas — Contact Heatmap</span>
    <input type="search" id="search" placeholder="Filter by name…" autocomplete="off">
  </div>
  <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
    <div class="legend">
      <div class="legend-item"><div class="dot" style="background:#4a9eff"></div>Meeting</div>
      <div class="legend-item"><div class="dot" style="background:#FF0066"></div>Call</div>
      <div class="legend-item"><div class="dot" style="background:#3ecf6a"></div>WhatsApp</div>
      <div class="legend-item"><div class="dot" style="background:#999"></div>Email</div>
    </div>
    <a class="btn-new"
       href="https://www.notion.so/lalifrou/6409d082da9f475aad057f06e85818a3?showModal=table_create_row"
       target="_blank" rel="noopener noreferrer">＋ New</a>
  </div>
</header>

<div class="sort-bar">
  <span style="font-size:11px;color:#888;">Sort:</span>
  <button class="sort-btn active" data-sort="name">A → Z</button>
  <button class="sort-btn" data-sort="count-asc">Least contact ↑</button>
  <button class="sort-btn" data-sort="count-desc">Most contact ↓</button>
  <button class="sort-btn" data-sort="recent">Most recent</button>
</div>

<div class="heatmap-wrap">
  <div id="status" class="status">Loading…</div>
  <table id="heatmapTable" style="display:none">
    <thead id="heatmapHead"></thead>
    <tbody id="heatmapBody"></tbody>
  </table>
</div>

<script>
const TYPE_PRIORITY = ['Meeting','Call','WhatsApp','Email'];
let allContacts = [];
let nWeeks = 53;
let monthLabels = [];
let sortMode = 'name';

function typeClass(t) { return t ? t.toLowerCase() : ''; }

function buildMonthHeader() {
  const head = document.getElementById('heatmapHead');
  head.innerHTML = '';
  const tr = document.createElement('tr');

  // Empty cell for name column
  const nameTh = document.createElement('th');
  tr.appendChild(nameTh);

  // Group consecutive weeks by month
  let i = 0;
  while (i < monthLabels.length) {
    const label = monthLabels[i];
    // Count how many consecutive weeks share this month label (until next non-empty label)
    let span = 1;
    while (i + span < monthLabels.length && monthLabels[i + span] === '') span++;

    const th = document.createElement('th');
    th.className = 'month-label-cell';
    th.colSpan = span;
    th.textContent = label || '';
    tr.appendChild(th);
    i += span;
  }

  // Empty cell for count column
  tr.appendChild(document.createElement('th'));
  head.appendChild(tr);
}

function buildTable(contacts) {
  const table = document.getElementById('heatmapTable');
  const body = document.getElementById('heatmapBody');
  body.innerHTML = '';

  buildMonthHeader();

  if (contacts.length === 0) {
    document.getElementById('status').textContent = 'No contacts found.';
    document.getElementById('status').style.display = '';
    table.style.display = 'none';
    return;
  }

  contacts.forEach(contact => {
    const weekMap = {}, weekDate = {};
    contact.interactions.forEach(i => {
      const w = i.weekIndex;
      if (weekMap[w] === undefined) {
        weekMap[w] = i.type; weekDate[w] = i.date;
      } else {
        const ex = TYPE_PRIORITY.indexOf(weekMap[w]);
        const inc = TYPE_PRIORITY.indexOf(i.type);
        if (inc < ex) { weekMap[w] = i.type; weekDate[w] = i.date; }
      }
    });

    const tr = document.createElement('tr');

    // Name
    const nameTd = document.createElement('td');
    nameTd.className = 'name-cell';
    const a = document.createElement('a');
    a.textContent = contact.name;
    a.title = contact.name;
    if (contact.url) { a.href = contact.url; a.target = '_blank'; a.rel = 'noopener'; }
    nameTd.appendChild(a);
    tr.appendChild(nameTd);

    // Week cells
    for (let w = 0; w < nWeeks; w++) {
      const td = document.createElement('td');
      td.className = 'wk';
      const div = document.createElement('div');
      const t = weekMap[w];
      if (t) {
        div.className = typeClass(t);
        div.setAttribute('data-tip', (weekDate[w] || '') + ' · ' + t);
      }
      td.appendChild(div);
      tr.appendChild(td);
    }

    // Count
    const countTd = document.createElement('td');
    countTd.className = 'count-cell';
    countTd.textContent = contact.interactions.length;
    tr.appendChild(countTd);

    body.appendChild(tr);
  });

  table.style.display = '';
  document.getElementById('status').style.display = 'none';
}

function sortContacts(contacts, mode) {
  const c = [...contacts];
  if (mode === 'name') c.sort((a,b) => a.name.localeCompare(b.name));
  else if (mode === 'count-asc') c.sort((a,b) => a.interactions.length - b.interactions.length);
  else if (mode === 'count-desc') c.sort((a,b) => b.interactions.length - a.interactions.length);
  else if (mode === 'recent') c.sort((a,b) => {
    const aM = a.interactions.reduce((m,i) => i.date>m?i.date:m,'');
    const bM = b.interactions.reduce((m,i) => i.date>m?i.date:m,'');
    return bM.localeCompare(aM);
  });
  return c;
}

function filterAndRender() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let contacts = sortContacts(allContacts, sortMode);
  if (q) contacts = contacts.filter(c => c.name.toLowerCase().includes(q));
  buildTable(contacts);
}

document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    sortMode = btn.dataset.sort;
    filterAndRender();
  });
});

document.getElementById('search').addEventListener('input', filterAndRender);

async function load() {
  const status = document.getElementById('status');
  try {
    const res = await fetch('/.netlify/functions/notion');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    allContacts = data.contacts || [];
    nWeeks = data.nWeeks || 53;
    monthLabels = data.monthLabels || [];
    if (allContacts.length === 0) {
      status.textContent = 'No interactions logged yet.';
      return;
    }
    filterAndRender();
  } catch (err) {
    status.className = 'status error';
    status.textContent = 'Error: ' + err.message;
  }
}

load();
</script>
</body>
</html>
